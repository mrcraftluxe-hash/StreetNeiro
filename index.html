# Быстрая сортировка (Quicksort)
def quicksort(arr):
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + middle + quicksort(right)

# Использование
numbers = [3, 6, 8, 10, 1, 2, 1]
sorted_numbers = quicksort(numbers)
print(sorted_numbers)  # [1, 1, 2, 3, 6, 8, 10]

# Или проще:
print(sorted(numbers))  # встроенная сортировка

// Замыкание - функция, которая запоминает свои внешние переменные
function createCounter() {
    let count = 0;  // переменная "замыкается"
    
    return {
        increment: function() {
            count++;
            return count;
        },
        decrement: function() {
            count--;
            return count;
        },
        getCount: function() {
            return count;
        }
    };
}

// Используем

console.log(counter.increment()); // 1
console.log(counter.increment()); // 2

function fetchWithLoading() {
    const [data, setData] = useState(null);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState(null);

    const fetchData = async () => {
        setLoading(true);
        try {
            const response = await fetch('https://api.example.com/data');
            const json = await response.json();
            setData(json);
        } catch (err) {
            setError(err.message);
        } finally {
            setLoading(false);
        }
    };

    return { data, loading, error, fetchData };
}

        // Добавить сообщение
        function addMessage(text, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? '' : 'ai-message'}`;

            const avatar = document.createElement('div');
            avatar.className = `avatar ${isUser ? 'user-avatar' : 'ai-avatar'}`;
            avatar.innerHTML = isUser ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

            const content = document.createElement('div');
            content.className = 'message-content';
            
            // Форматируем текст с подсветкой кода
            content.innerHTML = formatMessage(text);

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            messagesDiv.appendChild(messageDiv);

            // Подсвечиваем код
            content.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });

            scrollToBottom();
        }

        // Форматирование сообщения
        function formatMessage(text) {
            const parts = text.split(/(```[\s\S]*?```)/g);
            return parts.map(part => {
                if (part.startsWith('```') && part.endsWith('```')) {
                    const code = part.slice(3, -3);
                    const firstLine = code.split('\n')[0];
                    const lang = firstLine.trim() || 'plaintext';
                    const codeContent = code.includes('\n') ? code.substring(code.indexOf('\n') + 1) : code;
                    return `<pre><code class="language-${lang}">${escapeHtml(codeContent)}</code></pre>`;
                } else {
                    return part.split('\n').map(p => p ? `<p>${escapeHtml(p)}</p>` : '').join('');
                }
            }).join('');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Индикатор печати
        function showTyping() {
            const indicator = document.createElement('div');
            indicator.className = 'message ai-message';
            indicator.id = 'typingIndicator';
            indicator.innerHTML = `
                <div class="avatar ai-avatar"><i class="fas fa-robot"></i></div>
                <div class="typing-indicator"><span></span><span></span><span></span></div>
            `;
            messagesDiv.appendChild(indicator);
            scrollToBottom();
        }

        function removeTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Поиск ответа в базе знаний
        function findAnswer(question) {
            question = question.toLowerCase();
            
            if (question.includes('python') || question.includes('питон') || question.includes('сортировк')) {
                return knowledgeBase.python;
            }
            if (question.includes('javascript') || question.includes('js') || question.includes('замыкани')) {
                return knowledgeBase.javascript;
            }
            if (question.includes('css') || question.includes('анимац') || question.includes('стил')) {
                return knowledgeBase.css;
            }
            if (question.includes('react') || question.includes('компонент') || question.includes('хук')) {
                return knowledgeBase.react;
            }
            if (question.includes('api') || question.includes('fetch') || question.includes('запрос') || question.includes('axios')) {
                return knowledgeBase.api;
            }
            
            return knowledgeBase.default;
        }

        // Отправка сообщения
        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Добавляем сообщение пользователя
            addMessage(text, true);
            
            // Очищаем поле
            userInput.value = '';
            userInput.style.height = 'auto';
            
            // Показываем индикатор печати
            showTyping();
            
            // Ищем ответ (имитация задержки)
            setTimeout(() => {
                removeTyping();
                const answer = findAnswer(text);
                addMessage(answer, false);
            }, 800);
        }

        // Установить пример
        window.setExample = function(text) {
            userInput.value = text;
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
            userInput.focus();
        };

        // Слушатели
        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Фокус на поле ввода
        userInput.focus();
    </script>
